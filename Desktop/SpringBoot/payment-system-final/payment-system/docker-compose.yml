version: '3.8'

# ─────────────────────────────────────────────────────────────
# FintechPay — Local Infrastructure
# Start with: docker-compose up -d
# Stop with:  docker-compose down
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fintech_postgres
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Idempotency cache) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fintech_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ (Payment queue + DLQ) ───────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fintech_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
